services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite:////app/storage/app.db
      UPLOAD_DIR: /app/storage/uploads
      FAISS_INDEX_PATH: /app/storage/faiss.index
      CORS_ALLOWED_ORIGINS: http://localhost:3002,http://127.0.0.1:3002
    ports:
      - "5000:5000"
    volumes:
      - backend-storage:/app/storage
    healthcheck:
      test: ["CMD", "/opt/venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_API_PROXY_TARGET: http://backend:5000
    ports:
      - "3002:3002"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  backend-storage:
